name: Feature request
description: Suggest a capture or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    attributes:
      label: Problem to solve
      description: Describe the workflow gap or friction.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed approach
      description: Describe the behavior or API you want.
  - type: textarea
    attributes:
      label: Real use case
      description: Explain the product capture, release, or demo scenario this would help with.
    validations:
      required: true
