name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm run pack:check

      - name: Show bundled npm version
        run: npm -v

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Show trusted publishing toolchain versions
        run: |
          node -v
          npm -v

      - name: Publish to npm
        run: npm publish --access public

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://npm.pkg.github.com
          scope: "@${{ github.repository_owner }}"

      - name: Prepare GitHub Packages mirror metadata
        run: |
          npm pkg set name="@${{ github.repository_owner }}/screenstage"
          npm pkg set repository.type="git"
          npm pkg set repository.url="https://github.com/${{ github.repository }}.git"

      - name: Publish mirror to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
